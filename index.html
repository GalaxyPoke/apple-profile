<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器描述文件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #007aff, #5ac8fa);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 32px rgba(0, 122, 255, 0.4);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 28px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 14px;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: rgba(255, 255, 255, 0.5); }
        .info-value { color: rgba(255, 255, 255, 0.9); font-weight: 500; }

        .download-btn {
            display: block;
            background: linear-gradient(135deg, #007aff, #0055cc);
            color: #fff;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .download-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3);
        }

        .tip {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            line-height: 1.6;
        }

        .tip a { color: rgba(255, 255, 255, 0.5); }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(52, 199, 89, 0.15);
            border: 1px solid rgba(52, 199, 89, 0.3);
            color: #34c759;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🧮</div>
        <h1>计算器描述文件</h1>
        <p class="subtitle">安装后将在主屏幕添加科学计算器图标，全屏体验 Desmos 计算器</p>

        <div class="badge">
            <div class="dot"></div>
            免费 · 可移除
        </div>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">文件名称</span>
                <span class="info-value">计算器描述文件</span>
            </div>
            <div class="info-row">
                <span class="info-label">类型</span>
                <span class="info-value">WebClip 快捷方式</span>
            </div>
            <div class="info-row">
                <span class="info-label">目标</span>
                <span class="info-value">Desmos 科学计算器</span>
            </div>
            <div class="info-row">
                <span class="info-label">全屏模式</span>
                <span class="info-value">✓ 开启</span>
            </div>
            <div class="info-row">
                <span class="info-label">可移除</span>
                <span class="info-value">✓ 是</span>
            </div>
        </div>

        <a href="calculator.mobileconfig" class="download-btn">📲 安装描述文件</a>

        <p class="tip">
            请使用 <strong>Safari</strong> 打开本页面<br>
            安装后前往 <strong>设置 → 通用 → VPN与设备管理</strong> 完成安装
        </p>
    </div>
</body>
</html>
