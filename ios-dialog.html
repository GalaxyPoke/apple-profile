<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>配置描述文件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: #8e8e93;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* iOS status bar */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            z-index: 100;
        }

        .status-time {
            font-size: 15px;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.3px;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 12px;
        }

        .signal-bar {
            width: 3px;
            background: #000;
            border-radius: 1px;
        }

        .signal-bar:nth-child(1) { height: 3px; }
        .signal-bar:nth-child(2) { height: 5px; }
        .signal-bar:nth-child(3) { height: 8px; }
        .signal-bar:nth-child(4) { height: 11px; }

        .network-type {
            font-size: 12px;
            font-weight: 600;
            color: #000;
        }

        .battery {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .battery-body {
            width: 25px;
            height: 12px;
            border: 1.5px solid rgba(0,0,0,0.35);
            border-radius: 3px;
            padding: 1.5px;
            position: relative;
        }

        .battery-fill {
            height: 100%;
            width: 20%;
            background: #ff3b30;
            border-radius: 1px;
        }

        .battery-tip {
            width: 2px;
            height: 5px;
            background: rgba(0,0,0,0.35);
            border-radius: 0 1px 1px 0;
        }

        /* Blurred screenshot background simulation */
        .bg-blur {
            position: fixed;
            inset: 0;
            background: #8e8e93;
            z-index: 0;
        }

        /* Overlay dimming */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* Dialog */
        .dialog {
            position: relative;
            z-index: 10;
            background: rgba(242, 242, 247, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 14px;
            width: calc(100% - 64px);
            max-width: 320px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .dialog-body {
            padding: 20px 16px 16px;
            text-align: center;
        }

        .dialog-text {
            font-size: 13px;
            color: #000;
            line-height: 1.5;
            text-align: left;
        }

        .dialog-divider {
            height: 0.5px;
            background: rgba(60, 60, 67, 0.29);
        }

        .dialog-buttons {
            display: flex;
        }

        .dialog-btn {
            flex: 1;
            padding: 11px 8px;
            font-size: 17px;
            font-family: inherit;
            background: none;
            border: none;
            cursor: pointer;
            color: #007aff;
            position: relative;
            transition: background 0.15s;
        }

        .dialog-btn:active {
            background: rgba(0, 0, 0, 0.08);
        }

        .dialog-btn.primary {
            font-weight: 600;
        }

        .dialog-btn-divider {
            width: 0.5px;
            background: rgba(60, 60, 67, 0.29);
        }

        /* Safari bottom bar */
        .safari-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(249, 249, 249, 0.94);
            border-top: 0.5px solid rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .safari-back {
            font-size: 24px;
            color: #007aff;
            line-height: 1;
        }

        .safari-url {
            flex: 1;
            text-align: center;
            font-size: 15px;
            color: #000;
            opacity: 0.6;
        }

        .safari-more {
            font-size: 22px;
            color: #007aff;
            line-height: 1;
        }

        /* Result screen */
        .result {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #f2f2f7;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            text-align: center;
        }

        .result.show { display: flex; }

        .result-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #34c759, #248a3d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
        }

        .result-sub {
            font-size: 15px;
            color: #8e8e93;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .result-btn {
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Status bar -->
    <div class="status-bar">
        <div class="status-time" id="clock">15:56</div>
        <div class="status-icons">
            <div class="signal-bars">
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
            </div>
            <span class="network-type">4G</span>
            <div class="battery">
                <div class="battery-body">
                    <div class="battery-fill"></div>
                </div>
                <div class="battery-tip"></div>
            </div>
        </div>
    </div>

    <div class="bg-blur"></div>
    <div class="overlay"></div>

    <!-- iOS-style dialog -->
    <div class="dialog" id="dialog">
        <div class="dialog-body">
            <p class="dialog-text">此网站正尝试下载一个配置描述文件。你要允许吗?</p>
        </div>
        <div class="dialog-divider"></div>
        <div class="dialog-buttons">
            <button class="dialog-btn" onclick="onIgnore()">忽略</button>
            <div class="dialog-btn-divider"></div>
            <button class="dialog-btn primary" onclick="onAllow()">允许</button>
        </div>
    </div>

    <!-- Safari bottom bar -->
    <div class="safari-bar">
        <span class="safari-back">‹</span>
        <span class="safari-url">galaxypoke.github.io</span>
        <span class="safari-more">···</span>
    </div>

    <!-- Result after clicking 允许 -->
    <div class="result" id="result">
        <div class="result-icon">✓</div>
        <div class="result-title">描述文件已下载</div>
        <div class="result-sub">前往 <strong>设置 → 通用 → VPN与设备管理</strong> 完成安装</div>
        <button class="result-btn" onclick="reset()">返回</button>
    </div>

    <script>
        // Live clock
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
        }
        updateClock();
        setInterval(updateClock, 10000);

        function onAllow() {
            document.getElementById('dialog').style.display = 'none';
            document.querySelector('.overlay').style.display = 'none';
            document.getElementById('result').classList.add('show');
        }

        function onIgnore() {
            document.getElementById('dialog').style.transform = 'scale(0.95)';
            document.getElementById('dialog').style.opacity = '0';
            document.getElementById('dialog').style.transition = 'all 0.2s';
            setTimeout(() => {
                document.getElementById('dialog').style.display = 'none';
                document.querySelector('.overlay').style.display = 'none';
            }, 200);
        }

        function reset() {
            document.getElementById('result').classList.remove('show');
            document.getElementById('dialog').style.display = '';
            document.getElementById('dialog').style.transform = '';
            document.getElementById('dialog').style.opacity = '';
            document.querySelector('.overlay').style.display = '';
        }
    </script>
</body>
</html>
